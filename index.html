<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0e16">
<meta name="description" content="Browse, filter and test OpenRouter AI models with your own API key.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" href="data:,">
<title>OpenRouter Model Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* =====================================================================
     DESIGN TOKENS
     ===================================================================== */
  :root{
    --bg:#0a0e16;
    --bg-gradient:
      radial-gradient(circle at 18% -10%, rgba(108,92,231,0.16), transparent 45%),
      radial-gradient(circle at 90% 5%, rgba(56,198,222,0.10), transparent 40%),
      var(--bg);

    --surface:rgba(255,255,255,0.045);
    --surface-hover:rgba(255,255,255,0.075);
    --surface-border:rgba(255,255,255,0.09);
    --surface-border-strong:rgba(255,255,255,0.16);

    --accent:#6C5CE7;
    --accent-light:#9C8CFB;
    --accent-2:#38C6DE;
    --amber:#F5B84C;
    --success:#34D399;
    --success-soft:rgba(52,211,153,0.14);
    --danger:#F26D6D;
    --danger-soft:rgba(242,109,109,0.14);
    --pink:#F472B6;

    --text:#ECEEF3;
    --text-dim:#9AA3B5;
    --text-faint:#636B7E;

    --radius-sm:10px;
    --radius-md:16px;
    --radius-lg:22px;
    --radius-pill:999px;

    --font-display:'Space Grotesk', -apple-system, 'Segoe UI', sans-serif;
    --font-body:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --font-mono:'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;

    --shadow-card:0 10px 30px -14px rgba(0,0,0,0.55);
    --shadow-pop:0 16px 40px -12px rgba(0,0,0,0.6);
    --transition:180ms cubic-bezier(.4,0,.2,1);
  }

  @media (prefers-reduced-motion: reduce){
    *, *::before, *::after{ animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important; scroll-behavior:auto !important; }
  }

  /* =====================================================================
     RESET & BASE
     ===================================================================== */
  *, *::before, *::after{ box-sizing:border-box; margin:0; padding:0; }
  html{ -webkit-text-size-adjust:100%; scroll-behavior:smooth; }
  body{
    background:var(--bg-gradient);
    color:var(--text);
    font-family:var(--font-body);
    font-size:15px;
    line-height:1.5;
    min-height:100vh;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  img, svg{ display:block; max-width:100%; }
  button, input, select, textarea{ font:inherit; color:inherit; }
  input, select, textarea{ background:none; border:none; outline:none; }
  button{ cursor:pointer; background:none; border:none; }
  a{ color:var(--accent-2); }
  .mono{ font-family:var(--font-mono); font-variant-numeric:tabular-nums; }
  .hidden{ display:none !important; }
  .icon{ width:1em; height:1em; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; }
  .icon svg{ width:100%; height:100%; }

  :focus-visible{ outline:2px solid var(--accent-2); outline-offset:2px; border-radius:6px; }

  /* =====================================================================
     LAYOUT
     ===================================================================== */
  .app-header{
    position:relative;
    padding:calc(28px + env(safe-area-inset-top)) 20px 26px;
    overflow:hidden;
    border-bottom:1px solid var(--surface-border);
  }
  #bgCanvas{
    position:absolute; inset:0; width:100%; height:100%;
    pointer-events:none; opacity:0.55;
  }
  .header-inner{ position:relative; z-index:1; max-width:720px; margin:0 auto; display:flex; align-items:center; gap:14px; }
  .brand-icon{
    width:44px; height:44px; flex-shrink:0; border-radius:14px;
    background:linear-gradient(135deg, var(--accent), var(--accent-2));
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 20px -6px rgba(108,92,231,0.55);
  }
  .brand-icon .icon{ width:24px; height:24px; color:#fff; }
  .app-header h1{
    font-family:var(--font-display);
    font-size:clamp(1.3rem, 4.5vw, 1.6rem);
    font-weight:700;
    letter-spacing:-0.01em;
  }
  .app-header .subtitle{ color:var(--text-dim); font-size:0.86rem; margin-top:2px; }

  .app-main{ max-width:720px; margin:0 auto; padding:18px 16px 40px; }

  footer.app-footer{
    max-width:720px; margin:0 auto; padding:10px 20px calc(28px + env(safe-area-inset-bottom));
    text-align:center; color:var(--text-faint); font-size:0.78rem;
  }

  /* =====================================================================
     CARD
     ===================================================================== */
  .card{
    background:var(--surface);
    border:1px solid var(--surface-border);
    border-radius:var(--radius-lg);
    padding:18px;
    backdrop-filter:blur(22px) saturate(140%);
    -webkit-backdrop-filter:blur(22px) saturate(140%);
    box-shadow:var(--shadow-card);
    margin-bottom:16px;
    animation:fadeSlideIn .45s ease both;
  }
  @keyframes fadeSlideIn{ from{ opacity:0; transform:translateY(8px);} to{ opacity:1; transform:translateY(0);} }

  .card-header{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:14px; }
  .card-header h2{ font-family:var(--font-display); font-size:1rem; font-weight:600; display:flex; align-items:center; gap:8px; }
  .card-header h2 .icon{ color:var(--accent-light); width:1.1em; height:1.1em; }

  /* =====================================================================
     STATUS BADGE (api key card)
     ===================================================================== */
  .status-badge{
    font-size:0.72rem; font-weight:600; padding:4px 10px; border-radius:var(--radius-pill);
    border:1px solid var(--surface-border-strong); color:var(--text-dim); white-space:nowrap;
  }
  .status-badge--saved{ color:var(--success); background:var(--success-soft); border-color:transparent; }

  /* =====================================================================
     FORM ELEMENTS
     ===================================================================== */
  .field-row{ margin-bottom:12px; }
  .input-with-action{
    display:flex; align-items:center; gap:6px;
    background:rgba(255,255,255,0.04);
    border:1px solid var(--surface-border);
    border-radius:var(--radius-sm);
    padding:4px 4px 4px 14px;
    transition:border-color var(--transition), background var(--transition);
  }
  .input-with-action:focus-within{ border-color:var(--accent); background:rgba(255,255,255,0.06); }
  .input-with-action input{
    flex:1; min-width:0; padding:10px 4px; font-family:var(--font-mono); font-size:0.88rem; letter-spacing:0.02em;
  }
  .input-with-action input::placeholder{ color:var(--text-faint); font-family:var(--font-body); letter-spacing:normal; }

  .icon-btn{
    width:36px; height:36px; flex-shrink:0; border-radius:var(--radius-sm);
    display:flex; align-items:center; justify-content:center;
    color:var(--text-dim); transition:background var(--transition), color var(--transition);
  }
  .icon-btn:hover{ background:var(--surface-hover); color:var(--text); }
  .icon-btn .icon{ width:18px; height:18px; }

  .btn-row{ display:flex; flex-wrap:wrap; gap:8px; }

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    padding:10px 16px; border-radius:var(--radius-pill);
    font-size:0.85rem; font-weight:600; letter-spacing:0.01em;
    transition:transform var(--transition), background var(--transition), border-color var(--transition), opacity var(--transition);
    white-space:nowrap;
  }
  .btn:active{ transform:scale(0.97); }
  .btn:disabled{ opacity:0.45; cursor:not-allowed; }
  .btn:disabled:active{ transform:none; }
  .btn .icon{ width:16px; height:16px; }

  .btn-primary{
    background:linear-gradient(135deg, var(--accent), #5646C9);
    color:#fff; box-shadow:0 8px 20px -8px rgba(108,92,231,0.6);
  }
  .btn-primary:not(:disabled):hover{ filter:brightness(1.08); }

  .btn-secondary{
    background:rgba(56,198,222,0.12); color:var(--accent-2); border:1px solid rgba(56,198,222,0.3);
  }
  .btn-secondary:not(:disabled):hover{ background:rgba(56,198,222,0.2); }

  .btn-ghost{
    background:rgba(255,255,255,0.04); color:var(--text-dim); border:1px solid var(--surface-border);
  }
  .btn-ghost:not(:disabled):hover{ background:var(--surface-hover); color:var(--text); }

  .btn-danger-ghost{
    background:rgba(242,109,109,0.08); color:var(--danger); border:1px solid rgba(242,109,109,0.25);
  }
  .btn-danger-ghost:not(:disabled):hover{ background:rgba(242,109,109,0.16); }

  .btn-sm{ padding:8px 13px; font-size:0.78rem; }
  .btn-block{ width:100%; }
  .btn-icon-text{ background:var(--surface); border:1px solid var(--surface-border); color:var(--text); padding:8px 14px; font-size:0.8rem; border-radius:var(--radius-pill); }
  .btn-icon-text:hover{ background:var(--surface-hover); }

  .inline-message{ margin-top:10px; font-size:0.82rem; color:var(--text-dim); min-height:1.2em; }
  .inline-message.is-success{ color:var(--success); }
  .inline-message.is-error{ color:var(--danger); }

  /* =====================================================================
     MODEL CONTROLS
     ===================================================================== */
  .controls-grid{ display:grid; grid-template-columns:1fr; gap:10px; }
  .search-wrap{
    grid-column:1 / -1;
    display:flex; align-items:center; gap:8px;
    background:rgba(255,255,255,0.04); border:1px solid var(--surface-border);
    border-radius:var(--radius-sm); padding:0 12px;
    transition:border-color var(--transition);
  }
  .search-wrap:focus-within{ border-color:var(--accent); }
  .search-wrap .icon{ width:16px; height:16px; color:var(--text-faint); flex-shrink:0; }
  .search-wrap input{ flex:1; min-width:0; padding:11px 4px; font-size:0.88rem; }
  .search-wrap input::placeholder{ color:var(--text-faint); }

  .select-wrap{ position:relative; }
  .select-wrap select{
    width:100%; appearance:none; -webkit-appearance:none;
    background:rgba(255,255,255,0.04); border:1px solid var(--surface-border);
    border-radius:var(--radius-sm); padding:11px 32px 11px 12px; font-size:0.83rem; color:var(--text);
    transition:border-color var(--transition);
  }
  .select-wrap select:focus{ border-color:var(--accent); }
  .select-wrap::after{
    content:''; position:absolute; right:12px; top:50%; width:9px; height:9px;
    border-right:2px solid var(--text-faint); border-bottom:2px solid var(--text-faint);
    transform:translateY(-70%) rotate(45deg); pointer-events:none;
  }
  @media (min-width:520px){
    .controls-grid{ grid-template-columns:1fr 1fr; }
  }
  @media (min-width:680px){
    .controls-grid{ grid-template-columns:2fr 1fr 1fr; }
    .search-wrap{ grid-column:auto; }
  }

  .model-summary{ margin-top:12px; font-size:0.78rem; color:var(--text-faint); }

  /* =====================================================================
     MODEL GRID & CARDS
     ===================================================================== */
  .model-grid{ display:grid; grid-template-columns:1fr; gap:12px; }
  @media (min-width:620px){ .model-grid{ grid-template-columns:1fr 1fr; } }
  @media (min-width:980px){ .model-grid{ grid-template-columns:1fr 1fr 1fr; } }

  .model-card{
    background:var(--surface); border:1px solid var(--surface-border); border-radius:var(--radius-md);
    padding:16px; display:flex; flex-direction:column; gap:10px;
    transition:transform var(--transition), border-color var(--transition), background var(--transition), box-shadow var(--transition);
    animation:fadeSlideIn .35s ease both;
  }
  .model-card:hover{ transform:translateY(-3px); border-color:rgba(108,92,231,0.4); background:var(--surface-hover); }
  .model-card.is-selected{ border-color:var(--accent); box-shadow:0 0 0 1px var(--accent), var(--shadow-card); }

  .model-card-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
  .model-name{ font-family:var(--font-display); font-size:0.98rem; font-weight:600; line-height:1.3; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .rec-star{ width:14px; height:14px; color:var(--amber); flex-shrink:0; }
  .rec-star svg{ width:100%; height:100%; }
  .model-provider{ font-size:0.76rem; color:var(--text-faint); margin-top:2px; }

  .model-desc{
    font-size:0.82rem; color:var(--text-dim); line-height:1.5;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }

  .badge-row{ display:flex; flex-wrap:wrap; gap:6px; }
  .badge{
    display:inline-flex; align-items:center; gap:4px; font-size:0.7rem; font-weight:600;
    padding:4px 9px; border-radius:var(--radius-pill); white-space:nowrap;
  }
  .badge .icon{ width:11px; height:11px; }
  .badge--free{ color:var(--success); background:var(--success-soft); }
  .badge--vision{ color:var(--accent-2); background:rgba(56,198,222,0.14); }
  .badge--reasoning{ color:var(--accent-light); background:rgba(108,92,231,0.16); }
  .badge--tools{ color:var(--amber); background:rgba(245,184,76,0.14); }
  .badge--image{ color:var(--pink); background:rgba(244,114,182,0.14); }

  .model-meta-row{ display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:wrap; margin-top:auto; }
  .meta-chip{ font-size:0.74rem; color:var(--text-dim); background:rgba(255,255,255,0.05); padding:4px 9px; border-radius:var(--radius-pill); }
  .price-chip{ font-size:0.72rem; color:var(--text-faint); font-family:var(--font-mono); }

  .model-card-actions{ display:flex; gap:8px; margin-top:4px; }
  .model-card-actions .btn{ flex:1; }

  /* =====================================================================
     LIST STATE (loading / error / empty)
     ===================================================================== */
  #modelListState{ margin-bottom:12px; }
  .state-box{
    text-align:center; padding:34px 20px; border:1px dashed var(--surface-border-strong);
    border-radius:var(--radius-md); color:var(--text-dim);
  }
  .state-box .icon{ width:30px; height:30px; margin:0 auto 12px; color:var(--text-faint); }
  .state-box.is-error .icon{ color:var(--danger); }
  .state-box p{ font-size:0.86rem; margin-bottom:14px; }
  .state-box .btn{ margin:0 auto; }

  .skeleton-grid{ display:grid; grid-template-columns:1fr; gap:12px; }
  @media (min-width:620px){ .skeleton-grid{ grid-template-columns:1fr 1fr; } }
  @media (min-width:980px){ .skeleton-grid{ grid-template-columns:1fr 1fr 1fr; } }
  .skeleton-card{
    height:190px; border-radius:var(--radius-md); border:1px solid var(--surface-border);
    background:linear-gradient(100deg, rgba(255,255,255,0.03) 30%, rgba(255,255,255,0.07) 50%, rgba(255,255,255,0.03) 70%);
    background-size:200% 100%; animation:shimmer 1.4s ease-in-out infinite;
  }
  @keyframes shimmer{ from{ background-position:150% 0; } to{ background-position:-50% 0; } }

  /* =====================================================================
     DETAILS CARD
     ===================================================================== */
  .details-title-row h3{ font-family:var(--font-display); font-size:1.05rem; font-weight:600; }
  .details-id-row{ display:flex; align-items:center; gap:8px; margin-top:8px; }
  .model-id-text{ font-size:0.78rem; color:var(--accent-2); word-break:break-all; flex:1; }
  .model-desc-full{ font-size:0.85rem; color:var(--text-dim); line-height:1.55; margin-top:12px; }

  .details-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px; }
  @media (min-width:480px){ .details-grid{ grid-template-columns:1fr 1fr 1fr; } }
  .detail-item{ display:flex; flex-direction:column; gap:3px; }
  .detail-label{ font-size:0.68rem; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-faint); }
  .detail-value{ font-size:0.85rem; color:var(--text); }

  .feature-chips{ display:flex; flex-wrap:wrap; gap:6px; margin-top:16px; }
  .chip{
    font-size:0.72rem; font-family:var(--font-mono); color:var(--text-dim);
    background:rgba(255,255,255,0.05); border:1px solid var(--surface-border);
    padding:4px 9px; border-radius:var(--radius-sm);
  }
  .chip--muted{ color:var(--text-faint); }

  /* =====================================================================
     TEST PANEL
     ===================================================================== */
  .test-target{ font-size:0.82rem; color:var(--text-dim); margin-bottom:10px; }
  .test-target strong{ color:var(--text); font-family:var(--font-display); }

  textarea#testPromptInput{
    width:100%; min-height:100px; resize:vertical;
    background:rgba(255,255,255,0.04); border:1px solid var(--surface-border); border-radius:var(--radius-sm);
    padding:12px 14px; font-size:0.88rem; line-height:1.5; color:var(--text);
    transition:border-color var(--transition);
  }
  textarea#testPromptInput:focus{ border-color:var(--accent); }
  textarea#testPromptInput::placeholder{ color:var(--text-faint); }

  .test-helper{ font-size:0.76rem; color:var(--text-faint); margin-top:6px; min-height:1.1em; }

  .response-box{
    margin-top:14px; border:1px solid var(--surface-border); border-radius:var(--radius-md);
    padding:14px; background:rgba(255,255,255,0.03); min-height:70px;
  }
  .response-box .placeholder-text{ color:var(--text-faint); font-size:0.84rem; }
  .response-text{ font-size:0.87rem; line-height:1.6; white-space:pre-wrap; word-break:break-word; }
  .response-meta{ display:flex; flex-wrap:wrap; gap:10px; margin-top:12px; padding-top:10px; border-top:1px solid var(--surface-border); font-size:0.72rem; color:var(--text-faint); font-family:var(--font-mono); }
  .response-loading{ display:flex; align-items:center; gap:10px; color:var(--text-dim); font-size:0.85rem; }
  .response-error{ color:var(--danger); font-size:0.85rem; }

  .spin{ animation:spin 0.8s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* =====================================================================
     TOASTS
     ===================================================================== */
  .toast-container{
    position:fixed; top:calc(14px + env(safe-area-inset-top)); left:0; right:0; z-index:200;
    display:flex; flex-direction:column; align-items:center; gap:8px; pointer-events:none; padding:0 16px;
  }
  .toast{
    pointer-events:auto; max-width:480px; width:100%;
    display:flex; align-items:center; gap:10px;
    background:rgba(18,20,28,0.92); border:1px solid var(--surface-border-strong);
    border-radius:var(--radius-md); padding:12px 16px; font-size:0.83rem;
    box-shadow:var(--shadow-pop); backdrop-filter:blur(16px);
    animation:toastIn .25s ease both;
  }
  .toast.is-out{ animation:toastOut .2s ease both; }
  @keyframes toastIn{ from{ opacity:0; transform:translateY(-10px); } to{ opacity:1; transform:translateY(0); } }
  @keyframes toastOut{ to{ opacity:0; transform:translateY(-8px); } }
  .toast .icon{ width:17px; height:17px; flex-shrink:0; }
  .toast--success .icon{ color:var(--success); }
  .toast--error .icon{ color:var(--danger); }
  .toast--info .icon{ color:var(--accent-2); }
</style>
</head>
<body>

  <!-- Toast notifications -->
  <div id="toastContainer" class="toast-container" aria-live="polite"></div>

  <!-- ===================== HEADER ===================== -->
  <header class="app-header">
    <canvas id="bgCanvas"></canvas>
    <div class="header-inner">
      <div class="brand-icon">
        <span class="icon" id="brandIcon"></span>
      </div>
      <div>
        <h1>OpenRouter Model Explorer</h1>
        <p class="subtitle">Explore, filter and test OpenRouter models</p>
      </div>
    </div>
  </header>

  <main class="app-main">

    <!-- ===================== API KEY CARD ===================== -->
    <section class="card" id="apiKeyCard">
      <div class="card-header">
        <h2><span class="icon" id="keyIcon"></span> API Key</h2>
        <span class="status-badge" id="keyStatusBadge">Not saved</span>
      </div>

      <div class="field-row">
        <div class="input-with-action">
          <input type="password" id="apiKeyInput" placeholder="sk-or-v1-..." autocomplete="off" autocapitalize="off" spellcheck="false" inputmode="text">
          <button type="button" class="icon-btn" id="toggleKeyVisibility" aria-label="Show API key">
            <span class="icon" id="eyeIcon"></span>
          </button>
        </div>
      </div>

      <div class="btn-row">
        <button type="button" class="btn btn-primary" id="saveKeyBtn">Save Key</button>
        <button type="button" class="btn btn-danger-ghost" id="deleteKeyBtn">Delete</button>
        <button type="button" class="btn btn-secondary" id="testConnectionBtn">Test Connection</button>
      </div>

      <p class="inline-message" id="apiKeyMessage" role="status" aria-live="polite"></p>
    </section>

    <!-- ===================== MODEL CONTROLS ===================== -->
    <section class="card" id="modelControlsCard">
      <div class="card-header">
        <h2>Models</h2>
        <button type="button" class="btn-icon-text" id="refreshModelsBtn">
          <span class="icon" id="refreshIcon" style="width:14px;height:14px;"></span> Refresh
        </button>
      </div>

      <div class="controls-grid">
        <div class="search-wrap">
          <span class="icon" id="searchIcon"></span>
          <input type="search" id="searchInput" placeholder="Search name, provider, description" autocomplete="off">
        </div>

        <div class="select-wrap">
          <select id="categorySelect" aria-label="Filter by category">
            <option value="all">All Categories</option>
            <option value="coding">Coding</option>
            <option value="reasoning">Reasoning</option>
            <option value="chat">Chat</option>
            <option value="writing">Writing</option>
            <option value="translation">Translation</option>
            <option value="vision">Vision</option>
            <option value="imagePrompting">Image Prompting</option>
            <option value="videoPrompting">Video Prompting</option>

/* ---------------------------------------------------------------------
   LOCAL STORAGE HELPERS
   --------------------------------------------------------------------- */
function loadFromStorage(key, fallback) {
  try {
    const v = localStorage.getItem(key);
    return v === null ? fallback : v;
  } catch (e) {
    return fallback;
  }
}
function saveToStorage(key, value) {
  try { localStorage.setItem(key, value); } catch (e) { /* storage unavailable - fail silently */ }
}
function removeFromStorage(key) {
  try { localStorage.removeItem(key); } catch (e) { /* ignore */ }
}

/* ---------------------------------------------------------------------
   INITIALIZATION
   --------------------------------------------------------------------- */

async function onTestConnection() {
  if (!state.apiKey) {
    showApiKeyMessage('Save an API key first.', 'error');
    return;
  }
  const originalLabel = dom.testConnectionBtn.innerHTML;
  dom.testConnectionBtn.disabled = true;
  dom.testConnectionBtn.innerHTML = `<span class="icon spin">${ICONS.spinner}</span> Testing...`;

  try {
    const response = await fetchWithTimeout(OPENROUTER_KEY_URL, {
      method: 'GET',
      headers: { 'Authorization': `Bearer ${state.apiKey}` }
    }, TIMEOUTS.KEY_TEST);

    if (!response.ok) {
      const detail = await parseErrorResponse(response);
      throw Object.assign(new Error(detail || 'Connection failed'), { status: response.status });
    }

    const data = await response.json();
    const info = (data && data.data) || {};
    let message = 'Connection successful — your key is valid.';
    if (typeof info.usage === 'number') {
      const limitText = (info.limit !== null && info.limit !== undefined) ? ` of $${info.limit}` : '';
      message = `Connected. $${info.usage.toFixed(2)}${limitText} used.`;
    }
    showApiKeyMessage(message, 'success');
    showToast('Connection successful', 'success');
  } catch (err) {
    const message = describeRequestError(err);
    showApiKeyMessage(message, 'error');
    showToast(message, 'error');
  } finally {
    dom.testConnectionBtn.disabled = false;
    dom.testConnectionBtn.innerHTML = originalLabel;
  }
}

function updateKeyStatusUI() {
  if (state.apiKey) {
    dom.keyStatusBadge.textContent = 'Saved';
    dom.keyStatusBadge.classList.add('status-badge--saved');
  } else {
    dom.keyStatusBadge.textContent = 'Not saved';
    dom.keyStatusBadge.classList.remove('status-badge--saved');
  }
}

function showApiKeyMessage(message, type) {
  dom.apiKeyMessage.textContent = message;
  dom.apiKeyMessage.className = 'inline-message' + (type ? ` is-${type}` : '');
}

/* ---------------------------------------------------------------------
   MODEL FETCHING
   --------------------------------------------------------------------- */
async function fetchModels(isManualRefresh) {
  if (state.isLoadingModels) return;
  state.isLoadingModels = true;
  state.fetchError = null;
  renderModelListArea(); // show the loading skeleton immediately

  try {
    if (typeof navigator !== 'undefined' && navigator.onLine === false) {
      throw Object.assign(new Error('offline'), { isOffline: true });
    }

    const response = await fetchWithTimeout(OPENROUTER_MODELS_URL, {
      method: 'GET',
      headers: { 'Accept': 'application/json' }
    }, TIMEOUTS.MODELS);

    if (!response.ok) {
      const detail = await parseErrorResponse(response);
      throw Object.assign(new Error(detail || 'Failed to fetch models'), { status: response.status });
    }

    const json = await response.json();
    const list = Array.isArray(json && json.data) ? json.data : [];

    state.models = list;
    state.categoryCache.clear();
    state.modelsLoaded = true;
    state.lastFetchTime = Date.now();

    // Important: clear the loading flag BEFORE rendering, otherwise
    // renderModelListArea() would still think we're loading and keep
    // showing skeletons instead of the freshly fetched list.
    state.isLoadingModels = false;
    applyFiltersAndSort();
    restoreSelectedModelUI();

    if (isManualRefresh) showToast(`Loaded ${list.length} models`, 'success');
  } catch (err) {
    console.error('Failed to fetch models:', err.message || err);
    state.fetchError = describeRequestError(err);
    state.isLoadingModels = false; // clear BEFORE rendering, same reason as above
    renderModelListArea();
    showToast(state.fetchError, 'error');
  }
}

/* Fetch with a timeout using AbortController so slow/hanging requests
   surface a clean error instead of spinning forever. */
async function fetchWithTimeout(url, options, timeoutMs) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    return await fetch(url, Object.assign({}, options, { signal: controller.signal }));
  } finally {
    clearTimeout(timer);
  }
}

async function parseErrorResponse(response) {
  try {
    const data = await response.json();
    return (data && data.error && data.error.message) || (data && data.message) || null;
  } catch (e) {
    return null;
  }
}

/* Turn a caught error (network failure, timeout, or HTTP error) into a
   single friendly, user-facing sentence. */
function describeRequestError(err) {
  if (err && err.isOffline) return 'No internet connection. Check your network and try again.';
  if (err && err.name === 'AbortError') return 'The request timed out. Please try again.';
  if (err && err.status) return statusToMessage(err.status, err.message);
  if (err instanceof TypeError) return 'Could not reach OpenRouter. Check your internet connection.';
  return (err && err.message) || 'Something went wrong. Please try again.';
}

function statusToMessage(status, detail) {
  switch (status) {
    case 400: return detail || 'Bad request. Please check your input and try again.';
    case 401: return 'Invalid API key. Please check your key and save it again.';
    case 402: return 'Insufficient credits on your OpenRouter account.';
    case 403: return 'Access denied for this request.';
    case 404: return 'Model not found — it may have been removed. Try refreshing the model list.';
    case 408: return 'The request timed out.';
    case 429: return 'Rate limited by OpenRouter. Please wait a moment and try again.';
    case 500: case 502: case 503: case 504:
      return 'OpenRouter is having issues right now. Please try again shortly.';
    default: return detail || `Unexpected error (status ${status}).`;
  }
}

/* ---------------------------------------------------------------------
   CATEGORIZATION
   Since the OpenRouter API has no notion of categories, each model is
   classified client-side from its id/name/description text, its declared
   input/output modalities, its supported parameters and its pricing.
   A model can belong to several categories at once.
   --------------------------------------------------------------------- */
function getModelCategories(model) {
  if (state.categoryCache.has(model.id)) return state.categoryCache.get(model.id);
  const cats = categorizeModel(model);
  state.categoryCache.set(model.id, cats);
  return cats;
}

function categorizeModel(model) {
  const cats = new Set();
  const haystack = [model.id, model.name, model.description].filter(Boolean).join(' ').toLowerCase();
  const arch = model.architecture || {};
  const inputMods = arch.input_modalities || [];
  const outputMods = arch.output_modalities || [];
  const supported = model.supported_parameters || [];
  const pricing = model.pricing || {};

  const isFree = (pricing.prompt === '0' && pricing.completion === '0') || /:free$/.test(model.id || '');
  cats.add(isFree ? 'free' : 'paid');

  if (inputMods.includes('image')) cats.add('vision');

  if (matchesKeywords(haystack, CATEGORY_KEYWORDS.coding)) cats.add('coding');

  if (matchesKeywords(haystack, CATEGORY_KEYWORDS.reasoning) ||
      supported.includes('reasoning') || supported.includes('include_reasoning')) {
    cats.add('reasoning');
  }

  if (matchesKeywords(haystack, CATEGORY_KEYWORDS.translation)) cats.add('translation');

  if (matchesKeywords(haystack, CATEGORY_KEYWORDS.video)) cats.add('videoPrompting');

  if (inputMods.includes('image') || outputMods.includes('image') ||
      matchesKeywords(haystack, CATEGORY_KEYWORDS.imagePrompt)) {
    cats.add('imagePrompting');
  }

  // Any model that produces text is broadly usable for chat and writing.
  if (outputMods.length === 0 || outputMods.includes('text')) {
    cats.add('chat');
    cats.add('writing');
  }

  return cats;
}

function matchesKeywords(haystack, keywords) {
  for (let i = 0; i < keywords.length; i++) {
    if (haystack.indexOf(keywords[i]) !== -1) return true;
  }
  return false;
}

function isRecommended(model) {
  const hay = `${model.id} ${model.name || ''}`.toLowerCase();
  return RECOMMENDED_KEYWORDS.some((k) => hay.indexOf(k) !== -1);
}

   FILTERING & SORTING
   --------------------------------------------------------------------- */
function onSearchChange() {
  state.search = dom.searchInput.value;
  saveToStorage(STORAGE_KEYS.SEARCH, state.search);
  applyFiltersAndSort();
}
function onCategoryChange() {
  state.category = dom.categorySelect.value;
  saveToStorage(STORAGE_KEYS.CATEGORY, state.category);
  applyFiltersAndSort();
}
function onSortChange() {
  state.sort = dom.sortSelect.value;
  saveToStorage(STORAGE_KEYS.SORT, state.sort);
  applyFiltersAndSort();
}

function applyFiltersAndSort() {
  const query = state.search.trim().toLowerCase();

  let list = state.models.filter((model) => {
    if (state.category !== 'all') {
      const cats = getModelCategories(model);
      if (!cats.has(state.category)) return false;
    }
    if (query) {
      const haystack = `${model.id} ${model.name || ''} ${model.description || ''} ${getProviderName(model.id)}`.toLowerCase();
      if (haystack.indexOf(query) === -1) return false;
    }
    return true;
  });

  list = sortModels(list, state.sort);
  state.filtered = list;
  renderModelListArea();
  renderModelSummary();
}

function sortModels(list, sortKey) {
  const arr = list.slice();
  switch (sortKey) {
    case 'alphabetical':
      arr.sort((a, b) => (a.name || a.id).localeCompare(b.name || b.id));
      break;
    case 'newest':
      arr.sort((a, b) => (b.created || 0) - (a.created || 0));
      break;
    case 'context':
      arr.sort((a, b) => getContextLength(b) - getContextLength(a));
      break;
    case 'recommended':
    default:
      // Stable sort: recommended models bubble up, original order preserved otherwise.
      arr.sort((a, b) => Number(isRecommended(b)) - Number(isRecommended(a)));
      break;
  }
  return arr;
}

function getContextLength(model) {
  return (model.top_provider && model.top_provider.context_length) || model.context_length || 0;
}

/* ---------------------------------------------------------------------
   RENDERING: MODEL LIST
   --------------------------------------------------------------------- */
function renderModelListArea() {
  if (state.isLoadingModels) {
    renderSkeletons();
    return;
  }
  if (state.fetchError) {
    dom.modelListGrid.innerHTML = '';
    dom.modelListState.innerHTML = buildStateBoxHTML({
      icon: ICONS.alertTriangle,
      isError: true,
      message: state.fetchError,
      actionLabel: 'Retry',
      actionAttr: 'retry'
    });
    return;
  }
  if (state.modelsLoaded && state.models.length === 0) {
    dom.modelListGrid.innerHTML = '';
    dom.modelListState.innerHTML = buildStateBoxHTML({
      icon: ICONS.inbox,
      message: 'No models are currently available from OpenRouter.',
      actionLabel: 'Retry',
      actionAttr: 'retry'
    });
    return;
  }
  if (state.modelsLoaded && state.filtered.length === 0) {
    dom.modelListGrid.innerHTML = '';
    dom.modelListState.innerHTML = buildStateBoxHTML({
      icon: ICONS.search,
      message: 'No models match your search and filters.',
      actionLabel: 'Clear filters',
      actionAttr: 'clear-filters'
    });
    return;
  }

  dom.modelListState.innerHTML = '';
  dom.modelListGrid.innerHTML = state.filtered.map(renderModelCardHTML).join('');
}

function renderSkeletons() {
  dom.modelListGrid.innerHTML = '';
  const cards = Array.from({ length: 6 }).map(() => '<div class="skeleton-card"></div>').join('');
  dom.modelListState.innerHTML = `<div class="skeleton-grid">${cards}</div>`;
}

function buildStateBoxHTML(opts) {
  return `
    <div class="state-box ${opts.isError ? 'is-error' : ''}">
      <span class="icon">${opts.icon}</span>
      <p>${escapeHtml(opts.message)}</p>
      <button type="button" class="btn btn-secondary btn-sm" data-action="${opts.actionAttr}">${escapeHtml(opts.actionLabel)}</button>
    </div>
  `;
}

function onModelListStateClick(e) {
  const btn = e.target.closest('button[data-action]');
  if (!btn) return;
  if (btn.dataset.action === 'retry') fetchModels(true);
  if (btn.dataset.action === 'clear-filters') clearFilters();
}

function clearFilters() {
  state.search = '';
  state.category = 'all';
  dom.searchInput.value = '';
  dom.categorySelect.value = 'all';
  saveToStorage(STORAGE_KEYS.SEARCH, '');
  saveToStorage(STORAGE_KEYS.CATEGORY, 'all');
  applyFiltersAndSort();
}

function renderModelSummary() {
  if (!state.modelsLoaded) { dom.modelSummary.textContent = ''; return; }
  const total = state.models.length;
  const shown = state.filtered.length;
  const countText = shown === total ? `${total} models` : `${shown} of ${total} models`;
  const updatedText = state.lastFetchTime ? ` · Updated ${timeAgo(state.lastFetchTime)}` : '';
  dom.modelSummary.textContent = countText + updatedText;
}

function renderModelCardHTML(model) {
  const cats = getModelCategories(model);
  const provider = getProviderName(model.id);
  const isFree = cats.has('free');
  const supported = model.supported_parameters || [];
  const outputMods = (model.architecture && model.architecture.output_modalities) || [];

  const badges = [];
  if (isFree) badges.push(badgeHTML('free', 'Free', ICONS.bolt));
  if (cats.has('vision')) badges.push(badgeHTML('vision', 'Vision', ICONS.eye));
  if (cats.has('reasoning')) badges.push(badgeHTML('reasoning', 'Reasoning', ICONS.sparkle));
  if (supported.includes('tools')) badges.push(badgeHTML('tools', 'Tools', ICONS.wrench));
  if (outputMods.includes('image')) badges.push(badgeHTML('image', 'Image', ICONS.image));

  const priceHTML = isFree
    ? ''
    : `<span class="price-chip">${formatPricePerMillion(model.pricing && model.pricing.prompt)} in · ${formatPricePerMillion(model.pricing && model.pricing.completion)} out</span>`;

  const recStar = isRecommended(model)
    ? `<span class="rec-star icon" title="Recommended">${ICONS.sparkle}</span>`
    : '';

  const isSelected = state.selectedModelId === model.id;

  return `
    <article class="model-card ${isSelected ? 'is-selected' : ''}" data-model-id="${escapeHtml(model.id)}">
      <div class="model-card-top">
        <div>
          <h3 class="model-name">${escapeHtml(model.name || model.id)}${recStar}</h3>
          <p class="model-provider">${escapeHtml(provider)}</p>
        </div>
      </div>
      <p class="model-desc">${escapeHtml(truncateText(model.description || 'No description available.', 150))}</p>
      <div class="badge-row">${badges.join('')}</div>
      <div class="model-meta-row">
        <span class="meta-chip mono">${formatContextLength(getContextLength(model))} ctx</span>
        ${priceHTML}
      </div>
      <div class="model-card-actions">
        <button type="button" class="btn btn-ghost btn-sm" data-action="view-details">Details</button>
        <button type="button" class="btn btn-primary btn-sm" data-action="select-model">Select</button>
      </div>
    </article>
  `;
}

function badgeHTML(type, label, icon) {
  return `<span class="badge badge--${type}"><span class="icon">${icon}</span>${label}</span>`;
}

function onModelGridClick(e) {
  const btn = e.target.closest('button[data-action]');
  if (!btn) return;
  const card = btn.closest('.model-card');
  const modelId = card && card.dataset.modelId;
  if (!modelId) return;

  if (btn.dataset.action === 'view-details') viewDetails(modelId);
  if (btn.dataset.action === 'select-model') selectModel(modelId);
}

function findModelById(id) {
  return state.models.find((m) => m.id === id);
}

/* ---------------------------------------------------------------------
   MODEL DETAILS & SELECTION
   --------------------------------------------------------------------- */
function viewDetails(modelId) {
  const model = findModelById(modelId);
  if (!model) return;
  state.detailsModelId = modelId;
  renderModelDetails(model);
  showSection(dom.modelDetailsCard);
  dom.modelDetailsCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function selectModel(modelId) {
  const model = findModelById(modelId);
  if (!model) return;

  state.selectedModelId = modelId;
  state.detailsModelId = modelId;
  saveToStorage(STORAGE_KEYS.SELECTED_MODEL, modelId);

  renderModelDetails(model);
  renderTestPanel();
  showSection(dom.modelDetailsCard);
  showSection(dom.testPanelCard);
  updateSelectedCardHighlight();

  dom.testPanelCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
  showToast(`Selected ${model.name || model.id}`, 'success');
}

function updateSelectedCardHighlight() {
  dom.modelListGrid.querySelectorAll('.model-card').forEach((el) => {
    el.classList.toggle('is-selected', el.dataset.modelId === state.selectedModelId);
  });
}

function showSection(el) { el.classList.remove('hidden'); }

// After a (re)fetch, silently restore a previously-selected model's UI
// without scrolling or toasting, so the user's prior context survives a refresh.
function restoreSelectedModelUI() {
  if (!state.selectedModelId) return;
  const model = findModelById(state.selectedModelId);
  if (!model) {
    // The previously selected model is no longer offered - clear it quietly.
    state.selectedModelId = null;
    removeFromStorage(STORAGE_KEYS.SELECTED_MODEL);
    return;
  }
  state.detailsModelId = state.selectedModelId;
  renderModelDetails(model);
  renderTestPanel();
  showSection(dom.modelDetailsCard);
  showSection(dom.testPanelCard);
  updateSelectedCardHighlight();
}

function renderModelDetails(model) {
  const arch = model.architecture || {};
  const pricing = model.pricing || {};
  const supported = model.supported_parameters || [];
  const inputMods = arch.input_modalities && arch.input_modalities.length ? arch.input_modalities.join(' + ') : 'text';
  const outputMods = arch.output_modalities && arch.output_modalities.length ? arch.output_modalities.join(' + ') : 'text';
  const modalityStr = `${inputMods} → ${outputMods}`;

  dom.modelDetailsBody.innerHTML = `
    <div class="details-title-row">
      <h3>${escapeHtml(model.name || model.id)}</h3>
      <p class="model-provider">${escapeHtml(getProviderName(model.id))}</p>
    </div>
    <div class="details-id-row">
      <code class="mono model-id-text">${escapeHtml(model.id)}</code>
      <button type="button" class="icon-btn" id="copyModelIdBtn" aria-label="Copy model ID">
        <span class="icon">${ICONS.copy}</span>
      </button>
    </div>
    <p class="model-desc-full">${escapeHtml(model.description || 'No description provided.')}</p>
    <div class="details-grid">
      <div class="detail-item">
        <span class="detail-label">Context Length</span>
        <span class="detail-value mono">${formatContextLength(getContextLength(model))} tokens</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">Input Cost</span>
        <span class="detail-value mono">${formatPricePerMillion(pricing.prompt)} / 1M tok</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">Output Cost</span>
        <span class="detail-value mono">${formatPricePerMillion(pricing.completion)} / 1M tok</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">Architecture</span>
        <span class="detail-value mono">${escapeHtml(modalityStr)}</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">Tokenizer</span>
        <span class="detail-value mono">${escapeHtml(arch.tokenizer || 'Unknown')}</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">Added</span>
        <span class="detail-value mono">${model.created ? formatDate(model.created) : 'Unknown'}</span>
      </div>
    </div>
    <div class="feature-chips">
      ${supported.length ? supported.map((p) => `<span class="chip">${escapeHtml(p)}</span>`).join('') : '<span class="chip chip--muted">No listed parameters</span>'}
    </div>
  `;

  const copyBtn = document.getElementById('copyModelIdBtn');
  if (copyBtn) copyBtn.addEventListener('click', () => copyModelId(model.id));
}

function copyModelId(modelId) {
  copyTextToClipboard(modelId).then(() => {
    showToast('Model ID copied', 'success');
  }).catch(() => {
    showToast('Could not copy — copy it manually.', 'error');
  });
}

function copyTextToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    return navigator.clipboard.writeText(text);
  }
  // Fallback for older browsers / non-secure contexts.
  return new Promise((resolve, reject) => {
    try {
      const temp = document.createElement('textarea');
      temp.value = text;
      temp.style.position = 'fixed';
      temp.style.opacity = '0';
      document.body.appendChild(temp);
      temp.focus();
      temp.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(temp);
      ok ? resolve() : reject(new Error('copy failed'));
    } catch (e) {
      reject(e);
    }
  });
}

/* ---------------------------------------------------------------------
   TEST PANEL
   --------------------------------------------------------------------- */
function renderTestPanel() {
  const model = findModelById(state.selectedModelId);
  dom.testModelName.textContent = model ? (model.name || model.id) : 'No model selected';
  dom.testResponseBox.innerHTML = '<p class="placeholder-text">Response will appear here.</p>';
  updateTestButtonState();
}

function updateTestButtonState() {
  const hasModel = !!state.selectedModelId;
  const hasKey = !!state.apiKey;
  dom.testModelBtn.disabled = !hasModel || !hasKey || state.isTesting;
  dom.testHelperText.textContent = !hasModel
    ? 'Select a model above first.'
    : !hasKey
      ? 'Save your API key first.'
      : '';
}

async function testSelectedModel() {
  const model = findModelById(state.selectedModelId);
  if (!model) { showToast('Select a model first.', 'error'); return; }
  if (!state.apiKey) { showToast('Save your API key first.', 'error'); return; }

  const prompt = dom.testPromptInput.value.trim();
  if (!prompt) {
    showToast('Write a prompt first.', 'error');
    dom.testPromptInput.focus();
    return;
  }

  state.isTesting = true;
  updateTestButtonState();
  renderTestLoading();

  const startTime = (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();

  try {
    const response = await fetchWithTimeout(OPENROUTER_CHAT_URL, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${state.apiKey}`,
        'Content-Type': 'application/json',
        'HTTP-Referer': getReferer(),
        'X-Title': 'OpenRouter Model Explorer'
      },
      body: JSON.stringify({
        model: model.id,
        messages: [{ role: 'user', content: prompt }]
      })
    }, TIMEOUTS.CHAT);

    const elapsedMs = Math.round(((typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now()) - startTime);

    if (!response.ok) {
      const detail = await parseErrorResponse(response);
      throw Object.assign(new Error(detail || 'Request failed'), { status: response.status });
    }

    const data = await response.json();
    const choice = (data && data.choices && data.choices[0]) || {};
    const content = (choice.message && choice.message.content) || '';
    renderTestResult(content, data.usage, elapsedMs, choice.finish_reason);
  } catch (err) {
    const message = describeRequestError(err);
    renderTestError(message);
    showToast(message, 'error');
  } finally {
    state.isTesting = false;
    updateTestButtonState();
  }
}

function renderTestLoading() {
  dom.testResponseBox.innerHTML = `
    <div class="response-loading">
      <span class="icon spin">${ICONS.spinner}</span>
      Waiting for response...
    </div>
  `;
}

function renderTestResult(content, usage, elapsedMs, finishReason) {
  const metaParts = [];
  if (usage) {
    if (typeof usage.prompt_tokens === 'number') metaParts.push(`Prompt: ${usage.prompt_tokens} tok`);
    if (typeof usage.completion_tokens === 'number') metaParts.push(`Completion: ${usage.completion_tokens} tok`);
    if (typeof usage.total_tokens === 'number') metaParts.push(`Total: ${usage.total_tokens} tok`);
  }
  metaParts.push(`${elapsedMs} ms`);
  if (finishReason) metaParts.push(`Finish: ${finishReason}`);

  dom.testResponseBox.innerHTML = `
    <p class="response-text">${escapeHtml(content || '(empty response)')}</p>
    <div class="response-meta">${metaParts.map((p) => `<span>${escapeHtml(p)}</span>`).join('')}</div>
  `;
}

function renderTestError(message) {
  dom.testResponseBox.innerHTML = `<p class="response-error">${escapeHtml(message)}</p>`;
}

function getReferer() {
  try {
    const origin = window.location.origin;
    if (origin && origin !== 'null' && origin.indexOf('file:') !== 0) return window.location.href;
  } catch (e) { /* ignore */ }
  return 'https://openrouter-model-explorer.local/';
}

/* ---------------------------------------------------------------------
   TOASTS
   --------------------------------------------------------------------- */
function showToast(message, type) {
  const toast = document.createElement('div');
  toast.className = `toast toast--${type || 'info'}`;
  const icon = type === 'success' ? ICONS.check : type === 'error' ? ICONS.alertTriangle : ICONS.info;
  toast.innerHTML = `<span class="icon">${icon}</span><span>${escapeHtml(message)}</span>`;
  toast.addEventListener('click', () => dismissToast(toast));
  dom.toastContainer.appendChild(toast);

  setTimeout(() => dismissToast(toast), 4200);
}
function dismissToast(toast) {
  if (!toast.parentNode || toast.classList.contains('is-out')) return;
  toast.classList.add('is-out');
  setTimeout(() => toast.remove(), 220);
}

/* ---------------------------------------------------------------------
   BACKGROUND ROUTING ANIMATION (signature header decoration)
   A quiet field of drifting nodes connected by thin lines when close
   together — a nod to OpenRouter routing requests across many models.
   --------------------------------------------------------------------- */
function initBackgroundAnimation() {
  const canvas = dom.bgCanvas;
  if (!canvas || !canvas.getContext) return;
  const ctx = canvas.getContext('2d');
  const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  let width = 0, height = 0, nodes = [];
  const NODE_COUNT = 22;
  const LINK_DIST = 120;

  function resize() {
    const header = canvas.parentElement;
    width = header.clientWidth;
    height = header.clientHeight;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    canvas.style.width = width + 'px';
    canvas.style.height = height + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function makeNodes() {
    nodes = Array.from({ length: NODE_COUNT }).map(() => ({
      x: Math.random() * width,
      y: Math.random() * height,
      vx: (Math.random() - 0.5) * 0.25,
      vy: (Math.random() - 0.5) * 0.25
    }));
  }

  function step() {
    ctx.clearRect(0, 0, width, height);

    for (const n of nodes) {
      n.x += n.vx; n.y += n.vy;
      if (n.x < 0 || n.x > width) n.vx *= -1;
      if (n.y < 0 || n.y > height) n.vy *= -1;
    }

    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const dx = nodes[i].x - nodes[j].x;
        const dy = nodes[i].y - nodes[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < LINK_DIST) {
          ctx.strokeStyle = `rgba(124,108,246,${0.16 * (1 - dist / LINK_DIST)})`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(nodes[i].x, nodes[i].y);
          ctx.lineTo(nodes[j].x, nodes[j].y);
          ctx.stroke();
        }
      }
    }
    for (const n of nodes) {
      ctx.fillStyle = 'rgba(158,143,251,0.55)';
      ctx.beginPath();
      ctx.arc(n.x, n.y, 1.6, 0, Math.PI * 2);
      ctx.fill();
    }

    if (!reduceMotion) requestAnimationFrame(step);
  }

  resize();
  makeNodes();
  step();

  window.addEventListener('resize', debounce(() => { resize(); makeNodes(); if (reduceMotion) step(); }, 200));
}

/* ---------------------------------------------------------------------
   FORMATTING UTILITIES
   --------------------------------------------------------------------- */
function getProviderName(modelId) {
  const slug = (modelId || '').split('/')[0];
  if (PROVIDER_NAMES[slug]) return PROVIDER_NAMES[slug];
  if (!slug) return 'Unknown';
  return slug.split('-').map(capitalize).join(' ');
}

function capitalize(word) {
  return word.charAt(0).toUpperCase() + word.slice(1);
}

function formatPricePerMillion(priceStr) {
  if (priceStr === undefined || priceStr === null || priceStr === '') return 'N/A';
  const val = parseFloat(priceStr);
  if (Number.isNaN(val)) return 'N/A';
  if (val === 0) return '$0';
  const perMillion = val * 1000000;
  const decimals = perMillion >= 10 ? 2 : perMillion >= 0.1 ? 3 : 4;
  // Trim trailing zeros (and a trailing decimal point) so "3.000" reads as "3".
  const trimmed = perMillion.toFixed(decimals).replace(/(\.\d*?)0+$/, '$1').replace(/\.$/, '');
  return '$' + trimmed;
}

function formatContextLength(n) {
  if (!n) return '—';
  if (n >= 1000000) return (n % 1000000 === 0 ? n / 1000000 : (n / 1000000).toFixed(1)) + 'M';
  if (n >= 1000) return Math.round(n / 1000) + 'K';
  return String(n);
}

function formatDate(unixSeconds) {
  try {
    return new Date(unixSeconds * 1000).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
  } catch (e) {
    return 'Unknown';
  }
}

function timeAgo(timestampMs) {
  const seconds = Math.floor((Date.now() - timestampMs) / 1000);
  if (seconds < 10) return 'just now';
  if (seconds < 60) return `${seconds}s ago`;
  const minutes = Math.floor(seconds / 60);
  if (minutes < 60) return `${minutes}m ago`;
  const hours = Math.floor(minutes / 60);
  if (hours < 24) return `${hours}h ago`;
  const days = Math.floor(hours / 24);
  return `${days}d ago`;
}

function truncateText(str, maxLen) {
  if (!str) return '';
  return str.length > maxLen ? str.slice(0, maxLen).trim() + '…' : str;
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function debounce(fn, wait) {
  let timer;
  return function debounced(...args) {
    clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, args), wait);
  };
}
